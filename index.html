<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tarro de galletas </title>
  <style>
    :root{
      --bg1:#081022;
      --bg2:#0c1633;
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.65);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      background:
        radial-gradient(900px 540px at 50% 20%, #1c2a58 0%, rgba(28,42,88,0) 55%),
        radial-gradient(1200px 700px at 50% 80%, #0a1a3a 0%, rgba(10,26,58,0) 60%),
        linear-gradient(180deg, var(--bg2), var(--bg1));
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      color: var(--text);
    }

    /* ✅ Contenedor general un pelín más ancho para que “respire” */
    .wrap{
      width:min(1120px, 94vw);
      display:grid;
      gap:16px;
      padding:22px;
    }

    /* ✅ Un “panel grande” de fondo (el que echas en falta) */
    .stage{
      position:relative;
      padding:34px;
      border-radius:26px;
      background: rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.14);
      backdrop-filter: blur(10px);
      box-shadow: 0 20px 80px rgba(0,0,0,.38);
      overflow:hidden;
    }
    .stage::before{
      content:"";
      position:absolute;
      inset:-40px; /* más grande que el contenido */
      border-radius:34px;
      background:
        radial-gradient(900px 420px at 25% 25%, rgba(255,255,255,.06), rgba(255,255,255,0) 60%),
        radial-gradient(900px 420px at 75% 65%, rgba(255,255,255,.05), rgba(255,255,255,0) 60%),
        linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
      pointer-events:none;
      opacity:.85;
    }

    .main{
      position:relative;
      z-index:1;
      display:grid;
      grid-template-columns: 1fr 340px; /* ✅ panel derecho algo más ancho */
      gap:22px;
      align-items:center;
    }

    .jar-area{
      display:grid;
      place-items:center;
      padding:18px 8px;
    }

    /* ====== JAR ====== */
    .jar-wrap{
      position:relative;
      width: 330px;
      height: 460px;
      filter: drop-shadow(0 24px 40px rgba(0,0,0,.35));
    }

    .jar{
      position:absolute;
      inset: 0;
      border-radius: 54px 54px 70px 70px;
      border: 2px solid rgba(255,255,255,.22);
      background:
        linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.04) 55%, rgba(255,255,255,.03));
      overflow:hidden;
    }

    .jar::before{
      content:"";
      position:absolute;
      inset: 10px 10px 12px 10px;
      border-radius: 44px 44px 58px 58px;
      border:1px solid rgba(255,255,255,.14);
      background: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,0) 55%);
      pointer-events:none;
    }

    .jar::after{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(120px 420px at 18% 30%, rgba(255,255,255,.22) 0%, rgba(255,255,255,0) 70%),
        radial-gradient(160px 420px at 85% 60%, rgba(255,255,255,.12) 0%, rgba(255,255,255,0) 70%),
        linear-gradient(90deg, rgba(255,255,255,.20), rgba(255,255,255,0) 30%, rgba(255,255,255,0) 70%, rgba(255,255,255,.10));
      mix-blend-mode: screen;
      opacity:.85;
      pointer-events:none;
    }

    /* ✅ tapa roja (si la quieres mantener) */
    .lid{
      position:absolute;
      top:-52px;
      left:50%;
      transform:translateX(-50%);
      width: 285px;
      height: 90px;
      border-radius: 26px 26px 22px 22px;
      background:
        radial-gradient(140px 60px at 50% 18%, rgba(255,255,255,.35), rgba(255,255,255,0) 70%),
        linear-gradient(180deg, rgba(255,70,70,.95), rgba(180,20,35,.95));
      border:1px solid rgba(255,255,255,.22);
      box-shadow:
        0 14px 28px rgba(0,0,0,.28),
        inset 0 1px 0 rgba(255,255,255,.25);
    }
    .lid:after{
      content:"";
      position:absolute;
      inset: 12px 16px;
      border-radius: 18px;
      border:1px solid rgba(255,255,255,.22);
      opacity:.9;
    }

    .base-shadow{
      position:absolute;
      left:50%;
      bottom:-14px;
      transform:translateX(-50%);
      width: 260px;
      height: 30px;
      border-radius:999px;
      background: radial-gradient(closest-side, rgba(0,0,0,.45), rgba(0,0,0,0));
      filter: blur(2px);
      opacity:.85;
    }

    /* ====== INNER CONTENT ====== */
    .inner{
      position:absolute;
      left: 14px;
      right: 14px;
      top: 18px;
      bottom: 16px;
      border-radius: 38px 38px 52px 52px;
      overflow:hidden;
    }

    .cookie-space{
      position:absolute;
      inset:0;
      pointer-events:none;
      filter: saturate(1.05) contrast(1.02);
    }

    .cover{
      position:absolute;
      left:0; right:0; top:0;
      height: 100%;
      background:
        linear-gradient(180deg, rgba(12,22,51,.55), rgba(12,22,51,.25)),
        radial-gradient(220px 260px at 30% 75%, rgba(255,255,255,.04), rgba(255,255,255,0) 72%);
      backdrop-filter: blur(0.6px);
      pointer-events:none;
      transition: height 650ms ease;
    }

    .glass-fog{
      position:absolute;
      inset:0;
      background:
        radial-gradient(240px 220px at 60% 35%, rgba(255,255,255,.05), rgba(255,255,255,0) 70%),
        radial-gradient(220px 260px at 30% 75%, rgba(255,255,255,.04), rgba(255,255,255,0) 72%);
      opacity:.7;
      pointer-events:none;
    }

    /* ====== COOKIES ====== */
    .cookie{
      position:absolute;
      border-radius: 50%;
      transform: translate(-50%, -50%) rotate(0deg);
      opacity:0;
      animation: appear 420ms ease forwards;
      box-shadow:
        inset 0 3px 0 rgba(255,255,255,.22),
        inset 0 -7px 10px rgba(0,0,0,.18),
        0 10px 18px rgba(0,0,0,.22);
      border: 1px solid rgba(0,0,0,.18);
      background:
        radial-gradient(circle at 28% 28%, #ffe0bc 0%, #e9a86f 45%, #c67e47 100%);
    }

    .cookie::before{
      content:"";
      position:absolute;
      inset: 4px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 30% 30%, rgba(255,255,255,.12), rgba(255,255,255,0) 55%),
        radial-gradient(circle at 60% 70%, rgba(0,0,0,.12), rgba(0,0,0,0) 60%),
        repeating-radial-gradient(circle at 50% 50%,
          rgba(0,0,0,.05) 0 2px,
          rgba(0,0,0,0) 2px 6px
        );
      opacity:.55;
      filter: blur(.3px);
    }

    .chip{
      position:absolute;
      border-radius: 50%;
      background: rgba(80, 35, 10, .92);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.18), 0 1px 2px rgba(0,0,0,.18);
      opacity:.95;
    }

    @keyframes appear{ to{ opacity:1; } }

    /* ====== RIGHT PANEL ====== */
    .panel{
      padding:16px;
      border:1px solid rgba(255,255,255,.14);
      border-radius:18px;
      background: rgba(255,255,255,.04);
      display:grid;
      gap:12px;
      min-height: 220px;
    }
    .big{
      font-size:34px;
      font-weight:780;
      line-height:1;
      letter-spacing:-.3px;
    }
    .small{font-size:13px;color:rgba(255,255,255,.65)}
    .bar{
      height:10px;border-radius:999px;
      background: rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.12);
      overflow:hidden;
    }
    .bar > i{
      display:block;height:100%;width:0%;
      background: linear-gradient(90deg, rgba(120,255,214,.95), rgba(78,182,255,.95));
      transition: width 650ms ease;
    }

    /* ====== HISTORY ====== */
    .hist{
      margin-top:6px;
      padding-top:10px;
      border-top:1px solid rgba(255,255,255,.12);
      display:grid;
      gap:10px;
    }
    .hist-title{
      font-size:13px;
      color: rgba(255,255,255,.75);
      font-weight:650;
      letter-spacing:.2px;
    }
    .hist-window{
      position:relative;
      height: 170px;
      overflow:hidden;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.18);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.06);
    }
    .hist-list{
      list-style:none;
      margin:0;
      padding:10px 10px;
      display:grid;
      gap:8px;
      will-change: transform;
    }
    .hist-item{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:10px 10px;
      border-radius:12px;
      background: rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.10);
    }
    .hist-left{
      display:grid;
      gap:2px;
      min-width:0;
    }
    .hist-date{
      font-size:12px;
      color: rgba(255,255,255,.70);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .hist-note{
      font-size:12px;
      color: rgba(255,255,255,.55);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .hist-add{
      font-weight:800;
      letter-spacing:.2px;
      white-space:nowrap;
    }

    /* Animación vertical suave cuando hay suficiente contenido */
    @keyframes scrollY {
      0%   { transform: translateY(0); }
      100% { transform: translateY(var(--scrollDistance)); }
    }

    @media (max-width: 920px){
      .wrap{ width:min(980px, 96vw); }
      .main{ grid-template-columns: 1fr; }
      .panel{ order:-1; }
      .stage{ padding:22px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="stage">
      <div class="main">
        <div class="jar-area">
          <div class="jar-wrap">
            <div class="lid"></div>

            <div class="jar" aria-label="Tarro de galletas">
              <div class="inner" id="inner">
                <div class="cookie-space" id="space"></div>
                <div class="cover" id="cover"></div>
                <div class="glass-fog"></div>
              </div>
            </div>

            <div class="base-shadow"></div>
          </div>
        </div>

        <aside class="panel">
          <div class="big"><span id="count">0</span>/<span id="max">0</span></div>
          <div class="small">Nivel de llenado</div>
          <div class="bar"><i id="bar"></i></div>

          <div class="hist">
            <div class="hist-title">Últimas entradas</div>
            <div class="hist-window">
              <ul class="hist-list" id="histList"></ul>
            </div>
          </div>
        </aside>
      </div>
    </div>
  </div>

  <script>
    // ==========
    // AJUSTA ESTO (TOTAL ACTUAL)
    // ==========
    const cookies = 4745; // total actual
    const MAX = 120000;

    // ==========
    // HISTÓRICO (añade aquí las entradas)
    // - date: "YYYY-MM-DD" o "YYYY-MM-DD HH:MM"
    // - add: galletas añadidas en esa entrada
    // - note: opcional (texto)
    // ==========
    const history = [
      { date: "2026-02-27", add: 1310 },
      { date: "2026-02-26", add: 2100 },
      { date: "2026-02-24", add: 835 },
      { date: "2026-02-21", add: 500 },
    ];

    // ----- Stats -----
    const count = Math.max(0, Math.min(MAX, cookies));
    document.getElementById("count").textContent = count;
    document.getElementById("max").textContent = MAX;

    const percent = (count / MAX) * 100;
    document.getElementById("bar").style.width = percent.toFixed(2) + "%";

    const space = document.getElementById("space");
    const cover = document.getElementById("cover");

    cover.style.height = (100 - percent).toFixed(2) + "%";

    // ----- Cookies render -----
    const W = space.clientWidth;
    const H = space.clientHeight;
    const fillPx = (H * percent) / 100;

    // Densidad visual (solo apariencia)
    const visualMax = 95;
    const visualCount = Math.round((count / MAX) * visualMax);

    function seededRandom(seed) {
      let t = seed % 2147483647;
      if (t <= 0) t += 2147483646;
      return () => (t = (t * 16807) % 2147483647) / 2147483647;
    }
    const rnd = seededRandom(count * 999 + 7);

    function halfWidthAt(yFromBottom) {
      const yNorm = yFromBottom / H;
      const widen = 0.92 + (1 - yNorm) * 0.08;
      return (W / 2) * widen;
    }

    const placed = [];
    const triesPerCookie = 40;

    for (let i = 0; i < visualCount; i++) {
      let ok = false;
      let x = 0, y = 0, size = 0;

      for (let k = 0; k < triesPerCookie; k++) {
        size = 44 + Math.round(rnd() * 16);

        const yFromBottom = (fillPx > 0 ? rnd() * fillPx : 0);
        const half = halfWidthAt(yFromBottom);

        const margin = size * 0.38;
        const xFromCenter = (rnd() * 2 - 1) * Math.max(half - margin, 10);

        x = (W / 2) + xFromCenter;
        y = H - yFromBottom;

        ok = true;
        for (const p of placed) {
          const dx = p.x - x;
          const dy = p.y - y;
          if (Math.hypot(dx, dy) < (p.r + size * 0.36)) { ok = false; break; }
        }
        if (ok) break;
      }
      if (!ok) continue;

      placed.push({ x, y, r: size * 0.36 });

      const c = document.createElement("div");
      c.className = "cookie";
      c.style.width = size + "px";
      c.style.height = size + "px";
      c.style.left = x + "px";
      c.style.top = y + "px";
      c.style.animationDelay = (i * 8) + "ms";

      const rot = (rnd() * 50 - 25).toFixed(1);
      c.style.transform = `translate(-50%,-50%) rotate(${rot}deg)`;

      const chips = 7 + Math.floor(rnd() * 6);
      for (let j = 0; j < chips; j++) {
        const chip = document.createElement("span");
        chip.className = "chip";
        const chipSize = 5 + Math.round(rnd() * 4);
        chip.style.width = chipSize + "px";
        chip.style.height = chipSize + "px";
        chip.style.left = (16 + rnd() * 68) + "%";
        chip.style.top  = (16 + rnd() * 68) + "%";
        c.appendChild(chip);
      }

      space.appendChild(c);
    }

    // ----- Historial render + auto-scroll -----
    function formatAdd(n) {
      const sign = n >= 0 ? "+" : "";
      return sign + n.toLocaleString("es-ES");
    }

    function renderHistory() {
      const list = document.getElementById("histList");
      list.innerHTML = "";

      // Ordena por fecha descendente (si tu formato es ISO, esto funciona bien)
      const items = [...history].sort((a,b) => String(b.date).localeCompare(String(a.date)));

      // Render
      for (const it of items) {
        const li = document.createElement("li");
        li.className = "hist-item";

        const left = document.createElement("div");
        left.className = "hist-left";

        const date = document.createElement("div");
        date.className = "hist-date";
        date.textContent = it.date;

        const note = document.createElement("div");
        note.className = "hist-note";
        note.textContent = it.note ? it.note : "Entrada de galletas";

        left.appendChild(date);
        left.appendChild(note);

        const add = document.createElement("div");
        add.className = "hist-add";
        add.textContent = formatAdd(it.add);

        li.appendChild(left);
        li.appendChild(add);
        list.appendChild(li);
      }

      // Si hay suficiente contenido, activamos scroll suave
      // (duplicamos la lista para hacer loop sin saltos)
      requestAnimationFrame(() => {
        const windowEl = list.parentElement;
        const contentH = list.scrollHeight;
        const windowH = windowEl.clientHeight;

        list.style.animation = "none";
        list.style.setProperty("--scrollDistance", "0px");

        if (contentH > windowH + 20) {
          const clone = list.cloneNode(true);
          clone.id = "";
          list.appendChild(document.createElement("div")).style.height = "10px";
          list.appendChild(clone);

          requestAnimationFrame(() => {
            const dist = -(contentH + 10); // sube hasta el final del primer bloque
            list.style.setProperty("--scrollDistance", dist + "px");
            list.style.animation = `scrollY ${Math.max(14, items.length * 2.2)}s linear infinite`;
          });
        }
      });
    }

    renderHistory();
  </script>
</body>
</html>
